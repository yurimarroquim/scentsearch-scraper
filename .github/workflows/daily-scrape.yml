name: Daily Price Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: ${{ matrix.store }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        store:
          - leloyn
          - epoca
          - belezanaweb
          - sephora
          - sieno
          - aaz
          - kingofparfums
          - pequiperfumes
          - romaaroma
          - opaque
          - amobeleza
          - drogariasaopaulo
          - kingofDecants
          - bhdecants
          - macdecants
          - sgimportados
          - decantslondrina
          - beautybox
          - anmy
          - neeche

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Scrape and sync ${{ matrix.store }}
        env:
          STORE_SLUG: ${{ matrix.store }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOVABLE_API_URL: ${{ secrets.LOVABLE_API_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          SCRAPER_TOKEN: ${{ secrets.SCRAPER_TOKEN }}
        run: python gha_run_store.py
