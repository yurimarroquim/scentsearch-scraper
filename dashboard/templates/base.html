<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScentSearch Scraper{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-bottom: 1px solid #2d3748; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        .header h1 { font-size: 1.5rem; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav { display: flex; gap: 0.5rem; margin-left: auto; }
        .nav a { color: #94a3b8; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; transition: all 0.2s; font-size: 0.9rem; }
        .nav a:hover, .nav a.active { background: #2d3748; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .card { background: #1a1a2e; border: 1px solid #2d3748; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card-title { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat { text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { color: #64748b; font-size: 0.85rem; margin-top: 0.25rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.75rem 1rem; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2d3748; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid #1e293b; color: #e2e8f0; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: rgba(34,197,94,0.15); color: #4ade80; }
        .badge-error { background: rgba(239,68,68,0.15); color: #f87171; }
        .badge-partial { background: rgba(234,179,8,0.15); color: #fbbf24; }
        .badge-running { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; border: none; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #2563eb); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #2d3748; color: #e2e8f0; }
        .btn-secondary:hover { background: #374151; }
        .price { color: #4ade80; font-weight: 600; }
        .discount { color: #fbbf24; font-size: 0.8rem; }
        .actions { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .alert { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
        @media (max-width: 768px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div>&#127849;</div>
    <h1>ScentSearch Scraper</h1>
    <nav class="nav">
        <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/stores" class="{% if active_page == 'stores' %}active{% endif %}">Lojas</a>
        <a href="/products" class="{% if active_page == 'products' %}active{% endif %}">Produtos</a>
        <a href="/logs" class="{% if active_page == 'logs' %}active{% endif %}">Logs</a>
        <a href="/wordpress" class="{% if active_page == 'wordpress' %}active{% endif %}">WordPress</a>
        <a href="/integrations" class="{% if active_page == 'integrations' %}active{% endif %}">Integrações</a>
    </nav>
</div>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
